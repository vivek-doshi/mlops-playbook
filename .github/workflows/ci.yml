name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 src/ pipelines/ tests/ monitoring/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ pipelines/ tests/ monitoring/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run data ingestion
      env:
        PYTHONPATH: .
      run: python pipelines/data_ingestion.py

    - name: Run training pipeline
      env:
        PYTHONPATH: .
      run: python pipelines/training_pipeline.py

    - name: Run tests
      env:
        PYTHONPATH: .
      run: pytest tests/

    - name: Build Docker Image
      run: |
        docker build -t mlops-inference:latest .
