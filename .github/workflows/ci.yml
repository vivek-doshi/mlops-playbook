name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 src/ pipelines/ tests/ monitoring/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ pipelines/ tests/ monitoring/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run data ingestion
      run: python pipelines/data_ingestion.py

    - name: Run tests
      run: pytest tests/

  train-and-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      PYTHONPATH: .

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run data ingestion
      run: python pipelines/data_ingestion.py

    - name: Run training pipeline
      run: python pipelines/training_pipeline.py
      continue-on-error: false
      timeout-minutes: 10

    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: models/
        retention-days: 7

    - name: Build Docker Image
      run: |
        docker build -t mlops-inference:latest .
