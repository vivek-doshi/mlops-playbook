version: '3.8'

services:
  inference_api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/model.pkl
      - PIPELINE_PATH=models/feature_pipeline.pkl
    volumes:
      - ./models:/app/models
    restart: always

  mlflow:
    image: python:3.12-slim
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlruns.db:/mlruns.db
    restart: always
