# EDUCATIONAL NOTE:
# Hydra is an advanced configuration management tool popular in complex ML projects.
# It allows dynamic overrides from the CLI (e.g. `python script.py model.max_depth=10`).
# Note that this file shares a similar structure to config.yaml but uses Hydra's syntax.

defaults:
  - _self_

data:
  raw_path: data/raw/dataset.csv
  processed_path: data/processed/dataset.csv
  test_size: 0.2
  random_state: 42

model:
  type: RandomForest
  n_estimators: 100
  max_depth: 5

mlflow:
  experiment_name: churn_prediction
  tracking_uri: sqlite:///mlruns.db
